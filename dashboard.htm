<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOR OPS</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Assistant', sans-serif;
    background: #f8fafc; /* רקע אפור-בהיר מאוד */
}

.card {
    background: #ffffff; /* כרטיסיות לבנות */
    border: 1px solid #e2e8f0;
    border-radius: 1rem;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); /* צללית עדינה */
}

.item {
    background: #f8fafc; /* משימות אפורות-בהירות */
    border: 1px solid #e2e8f0;
    border-radius: 0.75rem;
}

.item:hover {
    border-color: #3b82f6; /* מסגרת כחולה במעבר עכבר */
    background: #ffffff;
}
</style>
</head>

<body class="text-slate-900"> <div class="max-w-6xl mx-auto px-6 py-10 space-y-8">

<div class="flex justify-between items-center">
    <h1 class="text-2xl font-extrabold tracking-tight">
        DOR <span class="text-blue-600">OPS</span>
    </h1>

    <button onclick="fetchErrors()"
        class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-xl text-sm font-bold shadow-sm transition">
        רענן נתונים
    </button>
</div>

<div class="grid md:grid-cols-3 gap-4">

    <div class="card p-5">
        <p class="text-xs text-slate-500 font-semibold">משימות פתוחות</p>
        <h2 id="tasks-count" class="text-2xl font-black mt-1 text-slate-800">0</h2>
    </div>

    <div class="card p-5">
        <p class="text-xs text-slate-500 font-semibold">תקלות פעילות</p>
        <h2 id="errors-count" class="text-2xl font-black mt-1 text-red-600">0</h2>
    </div>

    <div class="card p-5">
        <p class="text-xs text-slate-500 font-semibold">סטטוס מערכת</p>
        <h2 class="text-2xl font-black mt-1 text-green-600">Online</h2>
    </div>

</div>

<div class="grid lg:grid-cols-2 gap-6">

<div class="card p-6 space-y-4">

    <h2 class="text-lg font-bold text-slate-800">משימות</h2>

    <div class="flex gap-2">
        <input id="new-task"
            class="flex-1 bg-white border border-slate-300 p-3 rounded-lg text-sm outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all"
            placeholder="הוסף משימה">

        <button onclick="addTask()"
            class="bg-blue-600 hover:bg-blue-500 text-white px-4 rounded-lg text-sm font-bold shadow-sm transition">
            הוסף
        </button>
    </div>

    <ul id="tasks-list" class="space-y-2"></ul>

</div>

<div class="space-y-4">

    <h2 class="text-lg font-bold text-slate-800">תקלות <span class="text-red-500">🚨</span></h2>

    <div id="errors-feed" class="space-y-3"></div>

</div>

</div>

</div>

<script>

// TASKS
let tasks = JSON.parse(localStorage.getItem('dor_ops_tasks') || '[]');

function renderTasks(){
    const list = document.getElementById('tasks-list');
    document.getElementById('tasks-count').innerText = tasks.length;

    list.innerHTML = '';

    if(!tasks.length){
        list.innerHTML = `<div class="text-slate-400 font-semibold text-sm text-center py-6 border border-dashed border-slate-300 rounded-lg">אין משימות פתוחות, הכל נקי!</div>`;
        return;
    }

    tasks.forEach((t,i)=>{
        list.innerHTML += `
        <li class="item px-4 py-3 flex justify-between items-center group transition shadow-sm">

            <div class="flex items-center gap-3">
                <button onclick="completeTask(${i})"
                    class="w-5 h-5 border-2 border-slate-300 rounded hover:border-blue-500 hover:bg-blue-50 transition flex items-center justify-center">
                </button>

                <span class="text-sm font-semibold text-slate-700">
                    ${t}
                </span>
            </div>

            <button onclick="completeTask(${i})"
                class="text-xs font-bold text-slate-400 hover:text-red-600 opacity-0 group-hover:opacity-100 transition">
                מחק
            </button>

        </li>`;
    });
}

function addTask(){
    const input = document.getElementById('new-task');
    if(!input.value.trim()) return;

    tasks.push(input.value);
    localStorage.setItem('dor_ops_tasks', JSON.stringify(tasks));
    input.value='';
    renderTasks();
}

function completeTask(i){
    tasks.splice(i,1);
    localStorage.setItem('dor_ops_tasks', JSON.stringify(tasks));
    renderTasks();
}

// התחברות למקש אנטר בשדה המשימות
document.addEventListener('DOMContentLoaded', () => {
    const input = document.getElementById('new-task');
    if (input) {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });
    }
});

// ERRORS
const GET_DATA_URL = 'https://hook.eu1.make.com/29sgfpk1oi15bvihqyalezspk1dnithw'; 
const UPDATE_STATUS_URL = 'https://hook.eu1.make.com/cuehxvvwthe9885ub50esv4w8sc1eqye'; 

async function fetchErrors(){
    const res = await fetch(GET_DATA_URL);
    const raw = await res.json();
    let items = (raw[0]?.body)||raw;

    const active = items.filter(i => (i.data?.Status || i.Status) !== 'Done');
    document.getElementById('errors-count').innerText = active.length;

    const container = document.getElementById('errors-feed');

    if(!active.length){
        container.innerHTML = `<div class="card p-10 text-center text-slate-500 font-bold text-lg shadow-sm border-dashed border-2 border-slate-200">הכל תקין במערכת 👍</div>`;
        return;
    }

    container.innerHTML = active.map(item=>{
        const d = item.data || item;
        const key = item.key || d.key;

        return `
        <div class="card p-5 space-y-4 shadow-sm hover:shadow-md transition">

            <div class="flex justify-between items-center text-xs">
                <span class="text-blue-800 bg-blue-50 px-2 py-1 rounded font-bold uppercase tracking-wide">
                    🏢 ${d.Organization || 'ארגון כללי'}
                </span>
                <span class="text-slate-400 font-semibold">
                    ${d.Timestamp ? new Date(d.Timestamp).toLocaleString('he-IL') : ''}
                </span>
            </div>

            <div class="text-base font-extrabold text-slate-900 leading-tight">
                ${d.Scenario_Name || 'ללא שם'}
            </div>

            <div class="bg-slate-50 border border-slate-200 p-3 rounded-lg text-[13px] font-mono text-slate-600 break-words leading-relaxed">
                <span class="text-red-500 font-bold">>></span> ${d.Error_Type || 'שגיאה לא מוגדרת'}
            </div>

            <button onclick="done('${key}')"
                class="w-full bg-slate-800 hover:bg-slate-900 text-white py-2.5 rounded-lg text-sm font-bold shadow-md transition active:scale-[0.98]">
                ✓ סגור תקלה
            </button>

        </div>`;
    }).join('');
}

async function done(key){
    await fetch(`${UPDATE_STATUS_URL}?key=${key}&status=Done`);
    fetchErrors();
}

// INIT
renderTasks();
fetchErrors();

</script>

</body>
</html>

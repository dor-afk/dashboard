<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOR OPS - Monitor V4.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;700;800&display=swap" rel="stylesheet">
    <style> body { font-family: 'Assistant', sans-serif; background-color: #f8fafc; } </style>
</head>
<body class="min-h-screen pb-20 text-right">

    <nav class="bg-slate-900 text-white p-5 shadow-lg mb-10 border-b-4 border-blue-600">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-extrabold tracking-tighter uppercase text-white">DOR <span class="text-blue-400">OPS</span></h1>
            <button onclick="fetchErrors()" class="bg-blue-600 hover:bg-blue-500 px-6 py-2 rounded-xl font-bold text-sm shadow-lg">רענן נתונים</button>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-4">
        
        <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 shadow-sm flex flex-col gap-6 mb-8">
            <h2 class="text-xl font-black text-slate-800">📋 צ'ק ליסט משימות</h2>
            
            <div class="flex gap-3">
                <input type="text" id="new-task" placeholder="מה צריך לעשות?" class="flex-1 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-3 text-sm font-bold focus:outline-none focus:border-blue-400 focus:bg-white transition-all">
                <button onclick="addTask()" class="bg-slate-800 hover:bg-black text-white font-bold px-6 py-3 rounded-2xl text-sm shadow-md transition-all active:translate-y-1">הוסף</button>
            </div>

            <ul id="tasks-list" class="flex flex-col gap-3">
                </ul>
        </div>

        <div id="errors-feed" class="grid gap-8">
            <div class="bg-white p-16 rounded-[2.5rem] text-center shadow-sm">
                <p class="text-slate-400 font-bold animate-pulse">טוען נתונים מהמערכת...</p>
            </div>
        </div>
    </main>

    <script>
        // ==========================================
        // מערכת משימות (Checklist)
        // ==========================================
        
        // משיכת משימות מהזיכרון של הדפדפן (כדי שלא יימחקו ברענון)
        let tasks = JSON.parse(localStorage.getItem('dor_ops_tasks')) || [];

        function renderTasks() {
            const list = document.getElementById('tasks-list');
            list.innerHTML = '';
            
            if (tasks.length === 0) {
                list.innerHTML = '<p class="text-slate-400 text-sm font-bold text-center py-4">אין משימות כרגע, הכל נקי! ✨</p>';
                return;
            }

            tasks.forEach((task, index) => {
                list.innerHTML += `
                    <li class="flex justify-between items-center bg-blue-50/50 border border-blue-100 p-4 rounded-2xl">
                        <span class="text-slate-700 font-bold text-sm pl-4">${task}</span>
                        <button onclick="completeTask(${index})" class="bg-white border border-green-200 text-green-600 hover:bg-green-500 hover:text-white px-4 py-2 rounded-xl font-bold text-xs transition-all shadow-sm">✓ בוצע</button>
                    </li>
                `;
            });
        }

        function addTask() {
            const input = document.getElementById('new-task');
            const taskText = input.value.trim();
            
            if (taskText !== '') {
                tasks.push(taskText);
                localStorage.setItem('dor_ops_tasks', JSON.stringify(tasks));
                input.value = ''; // ניקוי שדה הטקסט
                renderTasks();
            }
        }

        function completeTask(index) {
            // מחיקת המשימה מהמערך ועדכון הזיכרון
            tasks.splice(index, 1);
            localStorage.setItem('dor_ops_tasks', JSON.stringify(tasks));
            renderTasks();
        }

        // האזנה למקש Enter בשדה הטקסט של המשימות
        document.getElementById('new-task').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addTask();
        });

        // טעינת המשימות בפתיחת העמוד
        renderTasks();

        // ==========================================
        // מערכת שגיאות (Make) - מקורי
        // ==========================================
        const GET_DATA_URL = 'https://hook.eu1.make.com/29sgfpk1oi15bvihqyalezspk1dnithw'; 
        const UPDATE_STATUS_URL = 'https://hook.eu1.make.com/cuehxvvwthe9885ub50esv4w8sc1eqye'; 

        async function fetchErrors() {
            try {
                const response = await fetch(GET_DATA_URL);
                const raw = await response.json();
                let items = (Array.isArray(raw) && raw.length > 0 && raw[0].body) ? raw[0].body : (Array.isArray(raw) ? raw : []);
                render(items);
            } catch (e) {
                document.getElementById('errors-feed').innerHTML = `<div class="bg-white p-10 rounded-3xl text-center text-red-600 font-bold">שגיאת תקשורת</div>`;
            }
        }

        function render(items) {
            const container = document.getElementById('errors-feed');
            const active = items.filter(i => (i.data?.Status || i.Status) !== 'Done');

            if (active.length === 0) {
                container.innerHTML = `<div class="bg-white p-20 rounded-[2.5rem] text-center shadow-sm border border-slate-100"><p class="text-xl font-bold text-slate-700">הכל נקי, דור!</p></div>`;
                return;
            }

            container.innerHTML = active.map(item => {
                const d = item.data || item;
                const key = item.key || d.Key || d.key;
                
                const org = d.Organization || d.organization || 'ארגון כללי';
                const scenario = d.Scenario_Name || d.scenario || 'ללא שם';
                const url = d.Scenario_URL || d.scenario_url || d.url || ""; 
                const error = d.Error_Type || d.error || "לא נמצא פירוט לשגיאה";
                const formattedDate = d.Timestamp ? new Date(d.Timestamp).toLocaleString('he-IL') : '';

                return `
                <div class="bg-white border border-slate-200 rounded-[2.5rem] p-8 shadow-sm flex flex-col gap-6">
                    <div class="w-full text-right">
                        <div class="flex justify-between items-center mb-6 text-right">
                            <span class="bg-red-50 text-red-500 px-2 py-0.5 rounded border border-red-100 italic text-[10px] font-black tracking-widest uppercase">Make Incident</span>
                            <span class="text-slate-400 text-[11px] font-bold">${formattedDate}</span>
                        </div>

                        <div class="mb-4 text-right">
                            <div class="bg-blue-50 border border-blue-100 rounded-2xl p-4 inline-block min-w-[200px] shadow-sm">
                                <p class="text-[9px] text-blue-400 font-bold uppercase mb-1 tracking-widest">לקוח / ארגון</p>
                                <h3 class="text-blue-800 font-black text-xl leading-none">🏢 ${org}</h3>
                            </div>
                        </div>

                        <div class="mb-8 text-right">
                            <div class="bg-slate-50 border border-slate-200 rounded-2xl p-6 block w-full shadow-sm text-left" dir="ltr">
                                <p class="text-[9px] text-slate-400 font-bold uppercase mb-2 tracking-widest">Scenario Context:</p>
                                <h2 class="text-2xl font-black text-slate-800 leading-tight">${scenario}</h2>
                            </div>
                        </div>

                        <div class="text-right">
                             <p class="text-slate-400 text-[9px] font-bold uppercase mb-2 tracking-widest">תיאור טכני:</p>
                             <div class="bg-slate-900 rounded-2xl p-5 font-mono text-[13px] text-blue-200 shadow-inner border border-slate-800 text-left leading-relaxed" dir="ltr">
                                <span class="text-red-500 font-bold mr-2">>>></span> ${error.split('Need any help')[0].trim()}
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button onclick="done('${key}')" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-2xl text-xs shadow-xl shadow-blue-200 transition-all border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">סיימתי לטפל ✓</button>
                        ${url ? `<a href="${url}" target="_blank" class="flex-1 bg-slate-800 hover:bg-black text-white font-bold py-5 rounded-2xl text-center text-xs shadow-lg transition-all">פתח במייק ↗</a>` : ''}
                    </div>
                </div>`;
            }).join('');
        }

        async function done(key) {
            try {
                await fetch(`${UPDATE_STATUS_URL}?key=${encodeURIComponent(key)}&status=Done`);
                fetchErrors();
            } catch (e) { alert('העדכון נכשל'); }
        }

        fetchErrors();
    </script>
</body>
</html>

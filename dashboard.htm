<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DOR OPS - Pro Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Assistant', sans-serif;
    background: #020617;
}
.glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
}
.card-hover:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
</style>
</head>

<body class="text-white flex">

<!-- SIDEBAR -->
<aside class="w-64 h-screen glass p-6 flex flex-col gap-6 fixed">

    <h1 class="text-2xl font-black">
        DOR <span class="text-blue-400">OPS</span>
    </h1>

    <nav class="flex flex-col gap-3 text-sm">
        <a class="bg-blue-600 px-4 py-2 rounded-xl font-bold">דשבורד</a>
        <a class="hover:bg-white/10 px-4 py-2 rounded-xl">משימות</a>
        <a class="hover:bg-white/10 px-4 py-2 rounded-xl">תקלות</a>
    </nav>

    <div class="mt-auto">
        <button onclick="fetchErrors()" 
            class="w-full bg-white text-black py-2 rounded-xl font-bold hover:scale-105 transition">
            רענן נתונים
        </button>
    </div>

</aside>

<!-- MAIN -->
<main class="ml-64 w-full p-10 space-y-10">

<!-- TOP STATS -->
<div class="grid grid-cols-3 gap-6">

    <div class="glass p-6 rounded-2xl card-hover">
        <p class="text-sm text-white/50">משימות פתוחות</p>
        <h2 id="tasks-count" class="text-3xl font-black">0</h2>
    </div>

    <div class="glass p-6 rounded-2xl card-hover">
        <p class="text-sm text-white/50">תקלות פעילות</p>
        <h2 id="errors-count" class="text-3xl font-black text-red-400">0</h2>
    </div>

    <div class="glass p-6 rounded-2xl card-hover">
        <p class="text-sm text-white/50">סטטוס מערכת</p>
        <h2 class="text-3xl font-black text-green-400">Online</h2>
    </div>

</div>

<!-- TASKS -->
<div class="glass p-8 rounded-3xl space-y-6">

    <div class="flex justify-between items-center">
        <h2 class="text-xl font-black">משימות</h2>
    </div>

    <div class="flex gap-2">
        <input id="new-task"
            class="flex-1 bg-white/10 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="משימה חדשה">

        <button onclick="addTask()"
            class="bg-blue-600 px-6 rounded-xl font-bold hover:bg-blue-500">
            הוסף
        </button>
    </div>

    <ul id="tasks-list" class="space-y-3"></ul>

</div>

<!-- ERRORS -->
<div class="space-y-4">

    <h2 class="text-xl font-black text-red-400">תקלות</h2>

    <div id="errors-feed" class="grid gap-4"></div>

</div>

</main>

<script>

// TASKS
let tasks = JSON.parse(localStorage.getItem('dor_ops_tasks') || '[]');

function renderTasks() {
    const list = document.getElementById('tasks-list');
    const count = document.getElementById('tasks-count');

    count.innerText = tasks.length;
    list.innerHTML = '';

    if (!tasks.length) {
        list.innerHTML = `<div class="text-white/40">אין משימות</div>`;
        return;
    }

    tasks.forEach((t,i)=>{
        list.innerHTML += `
        <li class="glass p-4 rounded-xl flex justify-between card-hover">
            ${t}
            <button onclick="completeTask(${i})"
                class="text-green-400 hover:text-white">
                ✓
            </button>
        </li>`;
    });
}

function addTask(){
    const input = document.getElementById('new-task');
    if(!input.value.trim()) return;

    tasks.push(input.value);
    localStorage.setItem('dor_ops_tasks', JSON.stringify(tasks));
    input.value='';
    renderTasks();
}

function completeTask(i){
    tasks.splice(i,1);
    localStorage.setItem('dor_ops_tasks', JSON.stringify(tasks));
    renderTasks();
}

// ERRORS
const GET_DATA_URL = 'https://hook.eu1.make.com/29sgfpk1oi15bvihqyalezspk1dnithw'; 
const UPDATE_STATUS_URL = 'https://hook.eu1.make.com/cuehxvvwthe9885ub50esv4w8sc1eqye'; 

async function fetchErrors(){
    const res = await fetch(GET_DATA_URL);
    const raw = await res.json();
    let items = (raw[0]?.body)||raw;

    const active = items.filter(i => (i.data?.Status || i.Status) !== 'Done');

    document.getElementById('errors-count').innerText = active.length;

    const container = document.getElementById('errors-feed');

    container.innerHTML = active.map(item=>{
        const d = item.data || item;
        const key = item.key || d.key;

        return `
        <div class="glass p-6 rounded-2xl card-hover space-y-3">

            <div class="flex justify-between">
                <span class="text-red-400 text-sm font-bold">
                    ${d.Organization || 'ארגון'}
                </span>
                <span class="text-white/30 text-xs">
                    ${d.Timestamp ? new Date(d.Timestamp).toLocaleString('he-IL') : ''}
                </span>
            </div>

            <div class="font-black text-lg">
                ${d.Scenario_Name || 'Scenario'}
            </div>

            <div class="bg-black/50 p-3 rounded-xl font-mono text-sm text-blue-300">
                ${d.Error_Type || ''}
            </div>

            <button onclick="done('${key}')"
                class="w-full bg-blue-600 py-2 rounded-xl font-bold hover:bg-blue-500">
                סגור תקלה
            </button>

        </div>`;
    }).join('');
}

async function done(key){
    await fetch(`${UPDATE_STATUS_URL}?key=${key}&status=Done`);
    fetchErrors();
}

// INIT
renderTasks();
fetchErrors();

</script>

</body>
</html>
